services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: machine-frontend
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - machine-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: machine-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - ENV=development
    networks:
      - machine-net
    restart: unless-stopped

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: machine-mcp
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - machine-net
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: machine-n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=77.42.30.68
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=PoilAuMenton
      - TZ=Europe/Zurich
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - machine-net
    restart: unless-stopped

volumes:
  n8n_data:

networks:
  machine-net:
    driver: bridge